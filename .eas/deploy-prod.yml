name: Deploy to production
defaults:
  tools:
    bun: 1.3.5
on:
  # workflow_dispatch: {}
  # pull_request:
  #   branches:
  #     - main
jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: production
    env:
      EXPO_PUBLIC_APP_VARIANT: production
  # get_android_build:
  #   name: Check for existing android build
  #   needs: [fingerprint]
  #   type: get-build
  #   params:
  #     fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
  #     profile: production
  #     platform: android
  #     channel: production
  get_ios_build:
    name: Check for existing ios build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production
      platform: ios
      channel: production
      environment: EXPO_PUBLIC_APP_VARIANT

  # build_android:
  #   name: Build Android
  #   needs: [get_android_build]
  #   if: ${{ !needs.get_android_build.outputs.build_id }}
  #   type: build
  #   params:
  #     platform: android
  #     profile: production
  build_ios:
    name: Build iOS
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production
    env:
      EXPO_PUBLIC_APP_VARIANT: production
  #   params:
  #     build_id: ${{ needs.build_android.outputs.build_id }}
  submit_ios_build:
    name: Submit iOS Build
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
    env:
      EXPO_PUBLIC_APP_VARIANT: production

  # publish_android_update:
  #   name: Publish Android update
  #   needs: [get_android_build]
  #   if: ${{ needs.get_android_build.outputs.build_id }}
  #   type: update
  #   params:
  #     platform: android
  #     channel: production
  publish_ios_update:
    name: Publish iOS update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    params:
      platform: ios
      channel: production
    env:
      EXPO_PUBLIC_APP_VARIANT: production