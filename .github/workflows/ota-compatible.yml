name: OTA compatibility check

# Answers a single question for the changes just pushed to main: can they ship
# as an OTA update, or do they change the native fingerprint and therefore
# require a new native build? Compares the new main tip against the commit it
# replaced using the same `expo-updates fingerprint:generate` the deploy
# pipeline relies on. If the fingerprint is identical for every variant/platform
# the changes are OTA compatible; any difference means a native release is
# required.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ota-compatible:
    name: OTA compatibility check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      ota_compatible: ${{ steps.verdict.outputs.ota_compatible }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: 🌲 Create worktree for the base commit
        run: |
          set -euo pipefail

          # On a push, github.event.before is the commit main pointed at before
          # this push. It is all-zeroes for the very first push to a branch, so
          # fall back to the previous commit in that case (and on
          # workflow_dispatch, where the event carries no before SHA).
          if [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
          else
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          echo "Base commit: ${BASE_SHA}"
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"

          git worktree remove --force .__ota_base__ 2>/dev/null || true
          git worktree add --detach .__ota_base__ "${BASE_SHA}"
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}

      - name: ⚙️ Install dependencies for base commit
        run: |
          set -euo pipefail

          pushd .__ota_base__ >/dev/null
          bun install --frozen-lockfile
          popd >/dev/null

      - name: 🧬 Compare fingerprints
        id: fp
        run: |
          set -euo pipefail

          OTA_COMPATIBLE="true"

          for VARIANT in production testflight internal; do
            echo "=== Variant: $VARIANT ==="
            export EXPO_PUBLIC_APP_VARIANT="$VARIANT"

            echo "Computing HEAD fingerprints..."
            HEAD_IOS="$(bunx expo-updates fingerprint:generate --platform ios | jq -r '.hash')"
            HEAD_ANDROID="$(bunx expo-updates fingerprint:generate --platform android | jq -r '.hash')"

            echo "Computing BASE fingerprints..."
            pushd .__ota_base__ >/dev/null
            export EXPO_PUBLIC_APP_VARIANT="$VARIANT"
            BASE_IOS="$(bunx expo-updates fingerprint:generate --platform ios | jq -r '.hash')"
            BASE_ANDROID="$(bunx expo-updates fingerprint:generate --platform android | jq -r '.hash')"
            popd >/dev/null

            if [ "$HEAD_IOS" != "$BASE_IOS" ] || [ "$HEAD_ANDROID" != "$BASE_ANDROID" ]; then
              OTA_COMPATIBLE="false"
            fi

            echo "head_ios_${VARIANT}=$HEAD_IOS" >> "$GITHUB_OUTPUT"
            echo "head_android_${VARIANT}=$HEAD_ANDROID" >> "$GITHUB_OUTPUT"
            echo "base_ios_${VARIANT}=$BASE_IOS" >> "$GITHUB_OUTPUT"
            echo "base_android_${VARIANT}=$BASE_ANDROID" >> "$GITHUB_OUTPUT"
          done

          echo "ota_compatible=$OTA_COMPATIBLE" >> "$GITHUB_OUTPUT"

      - name: ✅ Resolve verdict
        id: verdict
        run: |
          echo "ota_compatible=${STEPS_FP_OUTPUTS_OTA_COMPATIBLE}" >> "$GITHUB_OUTPUT"
        env:
          STEPS_FP_OUTPUTS_OTA_COMPATIBLE: ${{ steps.fp.outputs.ota_compatible }}

      - name: 📊 Summary
        run: |
          if [ "${OTA_COMPATIBLE}" = "true" ]; then
            echo "## ✅ OTA compatible" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The current changes do not alter the native fingerprint and can ship as an OTA update." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🔨 Native build required" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The current changes alter the native fingerprint. Bump the app version and cut a native release." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          OTA_COMPATIBLE: ${{ steps.fp.outputs.ota_compatible }}

      - name: 🧹 Clean up worktree
        if: always()
        run: git worktree remove --force .__ota_base__ || true
