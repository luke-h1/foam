name: OTA Surf

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EXPO_PUBLIC_APP_VARIANT: development

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-ota-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: 📱 Publish PR Preview Update
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: '.bun-version'

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: Λ Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: 🚀 Publish preview update & comment QR on PR
        uses: expo/expo-github-action/preview@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          command: >
            eas update
            --branch pr-${{ github.event.pull_request.number }}
            --channel development
            --platform all
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            --non-interactive
          comment: true
          qr-target: dev-build
          working-directory: ${{ github.workspace }}

      - name: 📊 Summary
        run: |
          echo "## 📱 PR Preview Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`pr-${{ github.event.pull_request.number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel:** \`development\` (dev client)" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Channel surf this PR** from the internal/dev client:" >> $GITHUB_STEP_SUMMARY
          echo "1. Scan the QR posted on the PR, **or**" >> $GITHUB_STEP_SUMMARY
          echo "2. Open the dev launcher → Extensions → EAS Update → pick branch \`pr-${{ github.event.pull_request.number }}\`." >> $GITHUB_STEP_SUMMARY
