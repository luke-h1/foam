name: Codex review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

concurrency:
  group: codex-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}-${{ github.event.comment.id || github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codex:
    if: |
      github.repository == 'luke-h1/foam' && (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '@codex') &&
          !endsWith(github.event.comment.user.login, '[bot]') &&
          github.event.comment.user.type != 'Bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.draft == false &&
          (
            vars.CODEX_REVIEW_ENABLED == 'true' ||
            contains(github.event.pull_request.labels.*.name, 'codex-review')
          )
        )
      )
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      triggered_by: ${{ steps.context.outputs.triggered_by }}
    steps:
      - name: Resolve pull request context
        id: context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              const prNumber = context.payload.inputs.pr_number;
              core.setOutput('pr_number', String(prNumber));
              core.setOutput('ref', `refs/pull/${prNumber}/merge`);
              core.setOutput('triggered_by', 'workflow_dispatch');
              return;
            }

            if (context.eventName === 'pull_request') {
              core.setOutput('pr_number', String(context.payload.pull_request.number));
              core.setOutput('ref', `refs/pull/${context.payload.pull_request.number}/merge`);
              core.setOutput('triggered_by', 'pull_request');
              return;
            }

            core.setOutput('pr_number', String(context.payload.issue.number));
            core.setOutput('ref', `refs/pull/${context.payload.issue.number}/merge`);
            core.setOutput('triggered_by', 'mention');

      - name: Checkout pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.context.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Build Codex prompt
        env:
          MENTION_COMMENT: ${{ github.event.comment.body }}
          TRIGGERED_BY: ${{ steps.context.outputs.triggered_by }}
        run: |
          set -euo pipefail
          prompt_file=".github/codex/review-run.md"
          review_prompt=".github/claude-review-prompt.md"

          mkdir -p "$(dirname "$prompt_file")"

          if [ "$TRIGGERED_BY" = "mention" ]; then
            {
              cat "$review_prompt"
              printf '\n\n## Triggering comment\n\n%s\n' "$MENTION_COMMENT"
            } > "$prompt_file"
          else
            cp "$review_prompt" "$prompt_file"
          fi

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/review-run.md
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: codex-output.md

  post_feedback:
    name: Post Codex feedback
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const header =
              process.env.TRIGGERED_BY === 'mention'
                ? '## Codex reply\n\n'
                : '## Codex review\n\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `${header}${process.env.CODEX_FINAL_MESSAGE}`,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex.outputs.pr_number }}
          TRIGGERED_BY: ${{ needs.codex.outputs.triggered_by }}
