name: Detect fingerprint changes

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  fingerprint:
    name: Detect fingerprint changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: ⚙️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🌲 Create worktree for the base commit
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git worktree remove --force .__pr_base__ 2>/dev/null || true
          git worktree add --detach .__pr_base__ "$BASE_SHA"

      - name: ⚙️ Install dependencies for base commit
        run: |
          set -euo pipefail

          pushd .__pr_base__ >/dev/null
          bun install --frozen-lockfile
          popd >/dev/null

      - name: 🧬 Compute fingerprints
        id: fp
        run: |
          set -euo pipefail

          CHANGED_ANY="false"

          for VARIANT in production testflight internal; do
            echo "=== Variant: $VARIANT ==="
            export APP_VARIANT="$VARIANT"

            echo "Computing HEAD fingerprints..."
            HEAD_IOS="$(bunx expo-updates fingerprint:generate --platform ios | jq -r '.hash')"
            HEAD_ANDROID="$(bunx expo-updates fingerprint:generate --platform android | jq -r '.hash')"

            echo "Computing BASE fingerprints..."
            pushd .__pr_base__ >/dev/null
            export APP_VARIANT="$VARIANT"
            BASE_IOS="$(bunx expo-updates fingerprint:generate --platform ios | jq -r '.hash')"
            BASE_ANDROID="$(bunx expo-updates fingerprint:generate --platform android | jq -r '.hash')"
            popd >/dev/null

            CHANGED="false"
            if [ "$HEAD_IOS" != "$BASE_IOS" ] || [ "$HEAD_ANDROID" != "$BASE_ANDROID" ]; then
              CHANGED="true"
              CHANGED_ANY="true"
            fi

            echo "head_ios_${VARIANT}=$HEAD_IOS" >> "$GITHUB_OUTPUT"
            echo "head_android_${VARIANT}=$HEAD_ANDROID" >> "$GITHUB_OUTPUT"
            echo "base_ios_${VARIANT}=$BASE_IOS" >> "$GITHUB_OUTPUT"
            echo "base_android_${VARIANT}=$BASE_ANDROID" >> "$GITHUB_OUTPUT"
            echo "changed_${VARIANT}=$CHANGED" >> "$GITHUB_OUTPUT"
          done

          echo "changed=$CHANGED_ANY" >> "$GITHUB_OUTPUT"

      - name: 💬 Comment on PR when fingerprints changed
        if: ${{ steps.fp.outputs.changed == 'true' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: fingerprint-diff
          message: |
            This pull request introduced fingerprint changes against the base commit.

            Make sure the app version is bumped before cutting a native release.

            <details>
            <summary>production</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_production }}` | `${{ steps.fp.outputs.head_ios_production }}` |
            | Android | `${{ steps.fp.outputs.base_android_production }}` | `${{ steps.fp.outputs.head_android_production }}` |

            </details>

            <details>
            <summary>testflight</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_testflight }}` | `${{ steps.fp.outputs.head_ios_testflight }}` |
            | Android | `${{ steps.fp.outputs.base_android_testflight }}` | `${{ steps.fp.outputs.head_android_testflight }}` |

            </details>

            <details>
            <summary>internal</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_internal }}` | `${{ steps.fp.outputs.head_ios_internal }}` |
            | Android | `${{ steps.fp.outputs.base_android_internal }}` | `${{ steps.fp.outputs.head_android_internal }}` |

            </details>

            - production changed: **${{ steps.fp.outputs.changed_production }}**
            - testflight changed: **${{ steps.fp.outputs.changed_testflight }}**
            - internal changed: **${{ steps.fp.outputs.changed_internal }}**

      - name: 💬 Comment on PR when fingerprints are unchanged
        if: ${{ steps.fp.outputs.changed != 'true' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: fingerprint-diff
          message: |
            No fingerprint differences were detected against the base commit.

            <details>
            <summary>production</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_production }}` | `${{ steps.fp.outputs.head_ios_production }}` |
            | Android | `${{ steps.fp.outputs.base_android_production }}` | `${{ steps.fp.outputs.head_android_production }}` |

            </details>

            <details>
            <summary>testflight</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_testflight }}` | `${{ steps.fp.outputs.head_ios_testflight }}` |
            | Android | `${{ steps.fp.outputs.base_android_testflight }}` | `${{ steps.fp.outputs.head_android_testflight }}` |

            </details>

            <details>
            <summary>internal</summary>

            | Platform | Base | Head |
            |---|---|---|
            | iOS | `${{ steps.fp.outputs.base_ios_internal }}` | `${{ steps.fp.outputs.head_ios_internal }}` |
            | Android | `${{ steps.fp.outputs.base_android_internal }}` | `${{ steps.fp.outputs.head_android_internal }}` |

            </details>

            - production changed: **${{ steps.fp.outputs.changed_production }}**
            - testflight changed: **${{ steps.fp.outputs.changed_testflight }}**
            - internal changed: **${{ steps.fp.outputs.changed_internal }}**

      - name: 📊 Summary
        run: |
          echo "## Fingerprint comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Base | Head | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS | \`${STEPS_FP_OUTPUTS_BASE_IOS_PRODUCTION}\` | \`${STEPS_FP_OUTPUTS_HEAD_IOS_PRODUCTION}\` | ${{ steps.fp.outputs.base_ios_production != steps.fp.outputs.head_ios_production }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android | \`${STEPS_FP_OUTPUTS_BASE_ANDROID_PRODUCTION}\` | \`${STEPS_FP_OUTPUTS_HEAD_ANDROID_PRODUCTION}\` | ${{ steps.fp.outputs.base_android_production != steps.fp.outputs.head_android_production }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### testflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Base | Head | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS | \`${STEPS_FP_OUTPUTS_BASE_IOS_TESTFLIGHT}\` | \`${STEPS_FP_OUTPUTS_HEAD_IOS_TESTFLIGHT}\` | ${{ steps.fp.outputs.base_ios_testflight != steps.fp.outputs.head_ios_testflight }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android | \`${STEPS_FP_OUTPUTS_BASE_ANDROID_TESTFLIGHT}\` | \`${STEPS_FP_OUTPUTS_HEAD_ANDROID_TESTFLIGHT}\` | ${{ steps.fp.outputs.base_android_testflight != steps.fp.outputs.head_android_testflight }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### internal" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Base | Head | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS | \`${STEPS_FP_OUTPUTS_BASE_IOS_INTERNAL}\` | \`${STEPS_FP_OUTPUTS_HEAD_IOS_INTERNAL}\` | ${{ steps.fp.outputs.base_ios_internal != steps.fp.outputs.head_ios_internal }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android | \`${STEPS_FP_OUTPUTS_BASE_ANDROID_INTERNAL}\` | \`${STEPS_FP_OUTPUTS_HEAD_ANDROID_INTERNAL}\` | ${{ steps.fp.outputs.base_android_internal != steps.fp.outputs.head_android_internal }} |" >> "$GITHUB_STEP_SUMMARY"
        env:
          STEPS_FP_OUTPUTS_BASE_IOS_PRODUCTION: ${{ steps.fp.outputs.base_ios_production }}
          STEPS_FP_OUTPUTS_HEAD_IOS_PRODUCTION: ${{ steps.fp.outputs.head_ios_production }}
          STEPS_FP_OUTPUTS_BASE_ANDROID_PRODUCTION: ${{ steps.fp.outputs.base_android_production }}
          STEPS_FP_OUTPUTS_HEAD_ANDROID_PRODUCTION: ${{ steps.fp.outputs.head_android_production }}
          STEPS_FP_OUTPUTS_BASE_IOS_TESTFLIGHT: ${{ steps.fp.outputs.base_ios_testflight }}
          STEPS_FP_OUTPUTS_HEAD_IOS_TESTFLIGHT: ${{ steps.fp.outputs.head_ios_testflight }}
          STEPS_FP_OUTPUTS_BASE_ANDROID_TESTFLIGHT: ${{ steps.fp.outputs.base_android_testflight }}
          STEPS_FP_OUTPUTS_HEAD_ANDROID_TESTFLIGHT: ${{ steps.fp.outputs.head_android_testflight }}
          STEPS_FP_OUTPUTS_BASE_IOS_INTERNAL: ${{ steps.fp.outputs.base_ios_internal }}
          STEPS_FP_OUTPUTS_HEAD_IOS_INTERNAL: ${{ steps.fp.outputs.head_ios_internal }}
          STEPS_FP_OUTPUTS_BASE_ANDROID_INTERNAL: ${{ steps.fp.outputs.base_android_internal }}
          STEPS_FP_OUTPUTS_HEAD_ANDROID_INTERNAL: ${{ steps.fp.outputs.head_android_internal }}

      - name: 🧹 Clean up worktree
        if: always()
        run: git worktree remove --force .__pr_base__ || true
