name: Check ast-grep
on:
  pull_request:
permissions:
  contents: read
jobs:
  ast-grep:
    name: ast-grep
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install
        with:
          node: 'true'

      - name: 🧪 Test ast-grep rules
        run: bun run test:ast-grep

      - name: 🔍 Run ast-grep scan
        run: bun run lint:ast-grep
