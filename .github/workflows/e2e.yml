name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  fingerprint:
    name: 🔍 Check Fingerprint
    runs-on: foam
    outputs:
      hash: ${{ steps.fingerprint.outputs.hash }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install
        with:
          ignore-scripts: 'true'

      - name: 🔍 Calculate fingerprint
        id: fingerprint
        run: |
          HASH=$(npx expo-updates fingerprint:generate --platform ios 2>/dev/null | jq -r '.hash' || echo "unknown-$(date +%s)")
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "📱 iOS Fingerprint: $HASH"

      - name: 📂 Check build cache
        id: cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: e2e-build.tar.gz
          key: e2e-ios-${{ steps.fingerprint.outputs.hash }}
          lookup-only: true

  build:
    name: 🔨 Build E2E App
    needs: fingerprint
    if: needs.fingerprint.outputs.cache-hit != 'true' || inputs.force_rebuild
    runs-on: foam
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install
        with:
          ignore-scripts: 'true'

      - name: 🔐 Load secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
          version: 2.34.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GOOGLE_SERVICES_IOS_PROD_BS4: op://ci-cd/foam-staging/GOOGLE_SERVICES_IOS_PROD_BS4

      - name: 📄 Decode Google Services file
        run: |
          echo "$GOOGLE_SERVICES_IOS_PROD_BS4" | base64 -d > GoogleService-Info-prod.plist

      - name: Λ Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: 📱 Build E2E app
        run: |
          eas build --profile e2e --platform ios --local --non-interactive --output=e2e-build.tar.gz
        env:
          EXPO_PUBLIC_APP_VARIANT: e2e
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 💾 Save build to cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: e2e-build.tar.gz
          key: e2e-ios-${{ needs.fingerprint.outputs.hash }}

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-build
          path: e2e-build.tar.gz
          retention-days: 30

  test:
    name: 🧪 Run E2E Tests
    needs: [fingerprint, build]
    if: always() && needs.fingerprint.result == 'success'
    runs-on: foam
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install
        with:
          ignore-scripts: 'true'

      - name: 📂 Restore build from cache
        if: needs.build.result == 'skipped'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: e2e-build.tar.gz
          key: e2e-ios-${{ needs.fingerprint.outputs.hash }}

      - name: 📥 Download build artifact
        if: needs.build.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: e2e-build

      - name: 📦 Extract app
        run: |
          tar -xzf e2e-build.tar.gz
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"

      - name: Λ Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: 📦 Push OTA update (JS changes only)
        if: needs.build.result == 'skipped'
        run: |
          echo "🚀 Pushing OTA update for JS changes..."
          eas update --channel e2e --message "E2E: ${E2E_UPDATE_MESSAGE}" --non-interactive || true
        env:
          EXPO_PUBLIC_APP_VARIANT: e2e
          E2E_UPDATE_MESSAGE: ${{ github.event.pull_request.title || github.sha }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🍎 Install Maestro
        env:
          MAESTRO_VERSION: '2.6.1'
          EXPECTED_SHA256: '3440825f514f537c6a96bcf5de995780c2a4a7f83a43208fdc95d4f1fecfad3b'
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl --fail --location --silent --show-error \
            "https://github.com/mobile-dev-inc/maestro/releases/download/cli-${MAESTRO_VERSION}/maestro.zip" \
            -o "$tmp/maestro.zip"
          echo "${EXPECTED_SHA256}  $tmp/maestro.zip" | shasum -a 256 -c -
          rm -rf "$HOME/.maestro"
          mkdir -p "$HOME/.maestro"
          unzip -qo "$tmp/maestro.zip" -d "$tmp"
          cp -rf "$tmp"/maestro/* "$HOME/.maestro"
          rm -rf "$tmp"
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: 📱 Boot Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -oE '[0-9A-F-]{36}')
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 5

      - name: 📲 Install app on simulator
        run: |
          xcrun simctl install booted "$APP_PATH"

      - name: 🚀 Start mock server
        run: |
          bun run e2e:mock-server &
          sleep 3

      - name: 🧪 Run Maestro tests
        run: |
          bun run e2e:test
        env:
          APP_ID: foam-tv-e2e
          DEV_CLIENT: 'false'

      - name: 📤 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-results-${{ github.run_id }}
          path: ~/.maestro/tests/
          retention-days: 7
