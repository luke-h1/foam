name: Cursor review

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: cursor-${{ github.event.pull_request.number }}-${{ github.event.review.id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cursor:
    # Runs automatically once Sentry finishes reviewing (its bot submits a PR review).
    if: |
      github.repository == 'luke-h1/foam' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      startsWith(github.event.review.user.login, 'sentry') &&
      github.event.review.user.type == 'Bot' &&
      (
        vars.CURSOR_REVIEW_ENABLED == 'true' ||
        contains(github.event.pull_request.labels.*.name, 'cursor-review')
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
    steps:
      - name: Resolve pull request context
        id: context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            core.setOutput('pr_number', String(context.payload.pull_request.number));
            core.setOutput('ref', `refs/pull/${context.payload.pull_request.number}/merge`);

      - name: Checkout pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.context.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Build Cursor prompt
        env:
          SENTRY_REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail
          prompt_file=".github/cursor/review-run.md"
          review_prompt=".github/claude-review-prompt.md"

          mkdir -p "$(dirname "$prompt_file")"
          cp "$review_prompt" "$prompt_file"

          if [ -n "${SENTRY_REVIEW_BODY:-}" ]; then
            {
              printf '\n\n## Sentry has already reviewed this PR\n\n'
              printf 'Sentry posted the review below. Do not repeat its findings; build on them and cover what it missed.\n\n%s\n' "$SENTRY_REVIEW_BODY"
            } >> "$prompt_file"
          fi

      - name: Load secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
          version: 2.34.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CURSOR_API_KEY: op://ci-cd/foam-mobile-production/CURSOR_API_KEY

      - name: Install Cursor CLI
        run: |
          set -euo pipefail
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Cursor
        id: run_cursor
        run: |
          set -euo pipefail
          cursor-agent \
            --force \
            --model composer-2.5 \
            --output-format text \
            -p "$(cat .github/cursor/review-run.md)" \
            | tee cursor-output.md

      - name: Upload Cursor output
        if: steps.run_cursor.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cursor-output
          path: cursor-output.md
          if-no-files-found: ignore

  post_feedback:
    name: Post Cursor feedback
    runs-on: ubuntu-latest
    needs: cursor
    if: needs.cursor.result == 'success'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download Cursor output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cursor-output

      - name: Post Cursor comments
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const outputPath = path.join(process.env.GITHUB_WORKSPACE, 'cursor-output.md');
            if (!fs.existsSync(outputPath)) {
              core.info('No cursor-output.md found; skipping comments.');
              return;
            }

            const content = fs.readFileSync(outputPath, 'utf8').trim();
            if (!content) {
              core.info('Empty cursor output; skipping comments.');
              return;
            }

            const delimiter = '---REVIEW_COMMENT---';
            const blocks = content
              .split(delimiter)
              .map((block) => block.trim())
              .filter(Boolean);

            const comments = blocks.length > 0 ? blocks : [content];

            for (const block of comments) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(process.env.PR_NUMBER),
                body: `## Cursor review\n\n${block}`,
              });
            }
        env:
          PR_NUMBER: ${{ needs.cursor.outputs.pr_number }}
