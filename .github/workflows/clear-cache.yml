name: Clear github-actions cache
on:
  workflow_dispatch:
permissions:
  actions: write

jobs:
  clear-github-actions-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Clear cache
        uses: actions/github-script@v6
        with:
          script: |
            const OTA_FINGERPRINT_KEY_PREFIX = 'fingerprint-';
            const OTA_UPDATE_IDS_KEY = 'ota-update-ids-production';
            const isOtaFingerprintCache = (key) =>
              key.startsWith(OTA_FINGERPRINT_KEY_PREFIX) || key === OTA_UPDATE_IDS_KEY;

            console.log("About to clear (preserving OTA fingerprint caches)")
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            let cleared = 0, skipped = 0
            for (const cache of caches.data.actions_caches) {
              if (isOtaFingerprintCache(cache.key)) {
                console.log("Skip (OTA fingerprint):", cache.key)
                skipped++
                continue
              }
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              })
              console.log("Cleared:", cache.key)
              cleared++
            }
            console.log("Done. Cleared:", cleared, "Skipped:", skipped)
