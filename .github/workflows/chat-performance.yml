name: Chat performance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/chat-performance.yml"
      - "scripts/workflows/chat-performance-comment.ts"
      - "src/components/Chat/**"
      - "src/screens/Preferences/ChatPreferenceScreen.tsx"
      - "src/screens/Preferences/ChatPreferencesPreview.tsx"
      - "src/screens/Preferences/chatPreferencePreviewFixtures.ts"
      - "src/store/chatStore/**"
      - "src/types/chat/**"
      - "src/types/emote.ts"
      - "src/utils/chat/**"
      - "src/utils/emote/**"
      - "src/utils/emoji/**"
      - "src/utils/image/preloadEmotes.ts"
      - "package.json"
      - "bun.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  chat-performance:
    name: Chat performance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc

      - name: Install PR dependencies
        run: bun install --frozen-lockfile

      - name: Create base worktree
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git worktree remove --force .__perf_base__ 2>/dev/null || true
          git worktree add --detach .__perf_base__ "$BASE_SHA"

      - name: Install base dependencies
        run: |
          set -euo pipefail

          pushd .__perf_base__ >/dev/null
          bun install --frozen-lockfile
          popd >/dev/null

      - name: Measure base chat performance
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          pushd .__perf_base__ >/dev/null
          bun run test:perf -- --baseline --branch "${{ github.base_ref }}" --commit-hash "$BASE_SHA" -- --testTimeout=30000
          popd >/dev/null

          mkdir -p .reassure
          cp .__perf_base__/.reassure/baseline.perf .reassure/baseline.perf

      - name: Measure PR chat performance
        id: perf
        continue-on-error: true
        run: |
          set -euo pipefail

          bun run test:perf -- --branch "${{ github.head_ref }}" --commit-hash "${{ github.event.pull_request.head.sha }}" -- --testTimeout=30000

      - name: Build PR comment
        if: always()
        run: |
          set -euo pipefail

          bunx tsx scripts/workflows/chat-performance-comment.ts \
            --status "${{ steps.perf.outcome }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output .reassure/pr-comment.md

      - name: Comment chat performance results
        if: always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: chat-performance
          path: .reassure/pr-comment.md

      - name: Fail on chat performance errors
        if: steps.perf.outcome == 'failure'
        run: exit 1
