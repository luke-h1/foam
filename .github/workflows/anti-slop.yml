name: PR Quality

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  anti-slop:
    name: Anti-Slop
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@753c51043d0c43564e1df382c173233c56cdb5e4
        with:
          max-failures: 5
          exempt-draft-prs: true
