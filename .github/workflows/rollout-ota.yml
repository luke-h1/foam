name: Rollout OTA

on:
  workflow_dispatch:
    inputs:
      ota_id:
        description: "OTA update group ID to progress rollout for"
        required: true
        type: string
      target_percentage:
        description: "Target percentage to roll out to (1-100)"
        required: true
        type: string

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  rollout:
    name: Rollout OTA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for EXPO_TOKEN
        run: >
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: ⬇️ Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: ".bun-version"

      - name: ⚙️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: 🔎 Fetch current rollout state
        id: current
        run: >
          bunx tsx scripts/workflows/rollout-ota.ts fetch-current
          --ota-id "${INPUTS_OTA_ID}"
        env:
          INPUTS_OTA_ID: ${{ inputs.ota_id }}

      - name: ✏️ Progress rollout
        if: ${{ steps.current.outputs.is_rollout == 'true' && steps.current.outputs.current_rollout != inputs.target_percentage }}
        run: >
          bunx tsx scripts/workflows/rollout-ota.ts progress
          --ota-id "${INPUTS_OTA_ID}"
          --target "${INPUTS_TARGET_PERCENTAGE}"
          --current "${STEPS_CURRENT_OUTPUTS_CURRENT_ROLLOUT}"
        env:
          INPUTS_OTA_ID: ${{ inputs.ota_id }}
          INPUTS_TARGET_PERCENTAGE: ${{ inputs.target_percentage }}
          STEPS_CURRENT_OUTPUTS_CURRENT_ROLLOUT: ${{ steps.current.outputs.current_rollout }}

      - name: 📊 Summary
        run: |
          echo "## OTA rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Update group:** \`${INPUTS_OTA_ID}\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "${STEPS_CURRENT_OUTPUTS_IS_ROLLOUT}" = "true" ]; then
            echo "- **Previous rollout:** \`${STEPS_CURRENT_OUTPUTS_CURRENT_ROLLOUT}%\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Requested rollout:** \`${INPUTS_TARGET_PERCENTAGE}%\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Result:** No rollout percentage detected. Nothing changed." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          INPUTS_OTA_ID: ${{ inputs.ota_id }}
          STEPS_CURRENT_OUTPUTS_IS_ROLLOUT: ${{ steps.current.outputs.is_rollout }}
          STEPS_CURRENT_OUTPUTS_CURRENT_ROLLOUT: ${{ steps.current.outputs.current_rollout }}
          INPUTS_TARGET_PERCENTAGE: ${{ inputs.target_percentage }}
