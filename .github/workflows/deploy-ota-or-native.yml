name: Deploy native or OTA

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Release variant'
        required: false
        type: choice
        default: 'production'
        options:
          - production
          - internal
          - testflight
      deploy_type:
        description: 'Deployment type'
        required: true
        type: choice
        default: 'auto'
        options:
          - auto # Detect using fingerprint
          - ota # Force OTA update
          - build # Force native build
      platform:
        description: 'Platform to deploy'
        required: false
        type: choice
        default: 'ios'
        options:
          - all
          - ios
          - android
      dry_run:
        description: 'Dry run mode (skip release creation)'
        required: false
        type: boolean
        default: false
      critical_update:
        description: 'Mark this OTA as critical'
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner to use for non-build jobs (use foam when github-hosted runners are degraded)'
        required: false
        type: choice
        default: 'github-hosted'
        options:
          - github-hosted
          - foam

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

permissions:
  contents: read

concurrency:
  group: deploy-ota-or-native-${{ inputs.variant || 'production' }}-${{ inputs.platform || 'ios' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 📋 Prepare
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 📌 Get version from app.config.ts
        id: get_version
        run: |
          VERSION=$(grep "const VERSION = " app.config.ts | sed "s/const VERSION = '//g" | sed "s/';//g" | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 App Version: $VERSION"

  test:
    name: 🧪 Test
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: 🧪 Run tests
        run: bun run test:ci

      - name: 📝 TypeScript check
        run: bun run ts:check

  detect-changes:
    name: 🔍 Detect Changes
    needs: [prepare, test]
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      fingerprint-changed: ${{ steps.compare.outputs.changed }}
      ios-fingerprint: ${{ steps.fingerprint.outputs.ios }}
      android-fingerprint: ${{ steps.fingerprint.outputs.android }}
      deploy-type: ${{ steps.decide.outputs.deploy-type }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # Need history for comparison
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: Load fingerprint cache secrets
        uses: ./.github/actions/load-fingerprint-cache-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          variant: ${{ inputs.variant || 'production' }}

      - name: 🔍 Calculate current fingerprints
        id: fingerprint
        run: |
          IOS_FP=$(npx expo-updates fingerprint:generate --platform ios 2>/dev/null | jq -r '.hash' || echo "unknown")
          ANDROID_FP=$(npx expo-updates fingerprint:generate --platform android 2>/dev/null | jq -r '.hash' || echo "unknown")

          echo "ios=$IOS_FP" >> $GITHUB_OUTPUT
          echo "android=$ANDROID_FP" >> $GITHUB_OUTPUT
          echo "📱 iOS Fingerprint: $IOS_FP"
          echo "🤖 Android Fingerprint: $ANDROID_FP"
        env:
          EXPO_PUBLIC_APP_VARIANT: ${{ inputs.variant || 'production' }}

      - name: 📂 Load previous fingerprints
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts restore-fingerprint-cache
          --cache-dir .fingerprint-cache
          --bucket "${FOAM_AWS_FINGERPRINT_BUCKET_NAME}"
          --branch "${GITHUB_REF_NAME}"
          --fallback-branch main
          --variant "${{ inputs.variant || 'production' }}"

      - name: 🔄 Compare fingerprints
        id: compare
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts compare-fingerprints
          --cache-dir .fingerprint-cache
          --current-ios "${STEPS_FINGERPRINT_OUTPUTS_IOS}"
          --current-android "${STEPS_FINGERPRINT_OUTPUTS_ANDROID}"
        env:
          STEPS_FINGERPRINT_OUTPUTS_IOS: ${{ steps.fingerprint.outputs.ios }}
          STEPS_FINGERPRINT_OUTPUTS_ANDROID: ${{ steps.fingerprint.outputs.android }}

      - name: 🤔 Decide deployment type
        id: decide
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts decide-deploy-type
          --manual-type "${{ inputs.deploy_type || 'auto' }}"
          --fingerprint-changed "${STEPS_COMPARE_OUTPUTS_CHANGED}"
        env:
          STEPS_COMPARE_OUTPUTS_CHANGED: ${{ steps.compare.outputs.changed }}

      - name: 🏷️ Generate release tag (preliminary)
        id: tag
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts preliminary-tag
          --version "${NEEDS_PREPARE_OUTPUTS_VERSION}"
          --deploy-type "${STEPS_DECIDE_OUTPUTS_DEPLOY_TYPE}"
          --variant "${{ inputs.variant || 'production' }}"
        env:
          NEEDS_PREPARE_OUTPUTS_VERSION: ${{ needs.prepare.outputs.version }}
          STEPS_DECIDE_OUTPUTS_DEPLOY_TYPE: ${{ steps.decide.outputs.deploy-type }}

      - name: 📊 Summary
        run: |
          echo "## Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Fingerprint | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | \`${STEPS_FINGERPRINT_OUTPUTS_IOS}\` | ${STEPS_COMPARE_OUTPUTS_CHANGED} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android | \`${STEPS_FINGERPRINT_OUTPUTS_ANDROID}\` | ${STEPS_COMPARE_OUTPUTS_CHANGED} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Decision:** ${{ steps.decide.outputs.deploy-type == 'build' && '🔨 Native Build' || '📦 OTA Update' }}" >> $GITHUB_STEP_SUMMARY
        env:
          STEPS_FINGERPRINT_OUTPUTS_IOS: ${{ steps.fingerprint.outputs.ios }}
          STEPS_COMPARE_OUTPUTS_CHANGED: ${{ steps.compare.outputs.changed }}
          STEPS_FINGERPRINT_OUTPUTS_ANDROID: ${{ steps.fingerprint.outputs.android }}

  build:
    name: 🔨 Native Build
    needs: [prepare, detect-changes]
    if: needs['detect-changes'].outputs['deploy-type'] == 'build'
    runs-on: foam
    concurrency: eas-build-${{ inputs.variant || 'production' }}-${{ inputs.platform || 'ios' }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: 🏷️ Resolve Sentry dist
        id: sentry_dist
        run: |
          DIST="$(bunx tsx scripts/workflows/variant-cli.ts sentry-dist --variant "${VARIANT}")"
          if [ -z "$DIST" ]; then
            echo "::error::Failed to resolve Sentry dist for variant ${VARIANT}"
            exit 1
          fi
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"
        env:
          VARIANT: ${{ inputs.variant || 'production' }}

      - name: Load secrets
        uses: ./.github/actions/load-native-deploy-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          variant: ${{ inputs.variant || 'production' }}

      - name: 📄 Decode and write Google service files
        uses: ./.github/actions/write-google-service-files
        with:
          variant: ${{ inputs.variant || 'production' }}

      - name: Λ Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: 🔨 Build & Submit
        uses: ./.github/actions/native-build-submit
        with:
          variant: ${{ inputs.variant || 'production' }}
          platform: ${{ inputs.platform || 'ios' }}
          sentry_release: ${{ needs.prepare.outputs.version }}
          sentry_dist: ${{ steps.sentry_dist.outputs.dist }}

      - name: 💾 Save fingerprints for next run
        uses: ./.github/actions/save-fingerprint-cache
        with:
          variant: ${{ inputs.variant || 'production' }}
          ios_fingerprint: ${{ needs['detect-changes'].outputs['ios-fingerprint'] }}
          android_fingerprint: ${{ needs['detect-changes'].outputs['android-fingerprint'] }}

      - name: 📊 Summary
        run: |
          echo "## Native Build Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ inputs.platform || 'ios' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Variant:** ${{ inputs.variant || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ inputs.variant || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto-submit:** Yes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fingerprints saved for future comparison." >> $GITHUB_STEP_SUMMARY

  ota:
    name: 📦 OTA Update
    needs: [prepare, detect-changes]
    if: needs['detect-changes'].outputs['deploy-type'] == 'ota'
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    concurrency: eas-update-${{ inputs.variant || 'production' }}-${{ inputs.platform || 'ios' }}
    outputs:
      ios_update_id: ${{ steps.publish.outputs.ios_update_id }}
      android_update_id: ${{ steps.publish.outputs.android_update_id }}
      update_group_id: ${{ steps.publish.outputs.update_group_id }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: 🏷️ Resolve Sentry dist
        id: sentry_dist
        run: |
          DIST="$(bunx tsx scripts/workflows/variant-cli.ts sentry-dist --variant "${VARIANT}")"
          if [ -z "$DIST" ]; then
            echo "::error::Failed to resolve Sentry dist for variant ${VARIANT}"
            exit 1
          fi
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"
        env:
          VARIANT: ${{ inputs.variant || 'production' }}

      - name: Load OTA deploy secrets
        uses: ./.github/actions/load-ota-deploy-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          variant: ${{ inputs.variant || 'production' }}

      - name: Λ Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: Restore critical OTA index
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts restore-critical-ota-index
          --cache-dir .ota-critical-cache
          --bucket "${FOAM_AWS_FINGERPRINT_BUCKET_NAME}"
          --variant "${{ inputs.variant || 'production' }}"

      - name: Determine critical OTA metadata
        id: critical_metadata
        uses: ./.github/actions/determine-critical-ota-metadata
        with:
          critical_update: ${{ inputs.critical_update }}
          head_commit_message: ${{ github.event.head_commit.message || '' }}

      - name: 📦 Publish OTA Update
        id: publish
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts publish-ota
          --platform "${{ inputs.platform || 'ios' }}"
          --variant "${{ inputs.variant || 'production' }}"
          --message "$DEPLOY_MESSAGE"
        env:
          EXPO_PUBLIC_APP_VARIANT: ${{ inputs.variant || 'production' }}
          EXPO_PUBLIC_SENTRY_RELEASE: ${{ needs.prepare.outputs.version }}
          EXPO_PUBLIC_SENTRY_DIST: ${{ steps.sentry_dist.outputs.dist }}
          SENTRY_RELEASE: ${{ needs.prepare.outputs.version }}
          SENTRY_DIST: ${{ steps.sentry_dist.outputs.dist }}
          SENTRY_LOAD_DOTENV: 0
          DEPLOY_MESSAGE: 'Deploy: ${{ github.event.head_commit.message || github.sha }}'
          OTA_CRITICAL_INDEX: ${{ steps.critical_metadata.outputs.next_index }}

      - name: 💾 Save fingerprints for next run
        uses: ./.github/actions/save-fingerprint-cache
        with:
          variant: ${{ inputs.variant || 'production' }}
          ios_fingerprint: ${{ needs['detect-changes'].outputs['ios-fingerprint'] }}
          android_fingerprint: ${{ needs['detect-changes'].outputs['android-fingerprint'] }}

      - name: 💾 Save critical OTA index
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts save-critical-ota-index
          --cache-dir .ota-critical-cache
          --bucket "${FOAM_AWS_FINGERPRINT_BUCKET_NAME}"
          --variant "${{ inputs.variant || 'production' }}"

      - name: 📊 Summary
        run: |
          echo "## OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **Variant:** ${{ inputs.variant || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ inputs.platform || 'ios' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Critical:** ${STEPS_CRITICAL_METADATA_OUTPUTS_IS_CRITICAL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Critical Index:** \`${STEPS_CRITICAL_METADATA_OUTPUTS_NEXT_INDEX}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Group ID:** \`${STEPS_PUBLISH_OUTPUTS_UPDATE_GROUP_ID}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Update deployed instantly to all users!" >> $GITHUB_STEP_SUMMARY
        env:
          STEPS_CRITICAL_METADATA_OUTPUTS_IS_CRITICAL: ${{ steps.critical_metadata.outputs.is_critical }}
          STEPS_CRITICAL_METADATA_OUTPUTS_NEXT_INDEX: ${{ steps.critical_metadata.outputs.next_index }}
          STEPS_PUBLISH_OUTPUTS_UPDATE_GROUP_ID: ${{ steps.publish.outputs.update_group_id }}

  release:
    name: 📝 Changelog / Release
    needs: [prepare, detect-changes, build, ota]
    if: always() && needs['detect-changes'].result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.ota.result == 'success' || needs.ota.result == 'skipped') && !inputs.dry_run
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ steps.create_release.outputs.tag }}
      deployment_type: ${{ needs['detect-changes'].outputs['deploy-type'] }}
      release_notes: ${{ steps.create_release.outputs.release_notes }}
      has_release_notes_file: ${{ steps.check_release_notes.outputs.has_file }}
      ios_update_id: ${{ needs.ota.outputs.ios_update_id || '' }}
      android_update_id: ${{ needs.ota.outputs.android_update_id || '' }}
      update_group_id: ${{ needs.ota.outputs.update_group_id || '' }}
      release_url: ${{ needs['detect-changes'].outputs['deploy-type'] == 'ota' && '' || format('https://github.com/{0}/releases/tag/{1}', github.repository, steps.create_release.outputs.tag) }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.LUKE_H1_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: 🏷️ Determine release tag
        id: release_tag
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts final-tag
          --deploy-type "${NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE}"
          --version "${NEEDS_PREPARE_OUTPUTS_VERSION}"
          --run-number "${{ github.run_number }}"
          --variant "${{ inputs.variant || 'production' }}"
        env:
          NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE: ${{ needs['detect-changes'].outputs['deploy-type'] }}
          NEEDS_PREPARE_OUTPUTS_VERSION: ${{ needs.prepare.outputs.version }}

      - name: 📝 Update changelog and release artifacts
        id: create_release
        uses: ./.github/actions/create-release
        with:
          github_token: ${{ secrets.LUKE_H1_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          dry: ${{ inputs.dry_run }}
          variant: ${{ inputs.variant || 'production' }}
          version: ${{ needs.prepare.outputs.version }}
          tag: ${{ steps.release_tag.outputs.tag }}
          deployment_type: ${{ needs['detect-changes'].outputs['deploy-type'] == 'ota' && 'ota' || 'native' }}
          commit_changelog: 'true'

      - name: Check for release notes file
        id: check_release_notes
        run: |
          if [ -f .release-notes-body.md ]; then
            echo "has_file=true" >> $GITHUB_OUTPUT
          else
            echo "has_file=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload release notes for Slack
        if: steps.check_release_notes.outputs.has_file == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-notes
          path: .release-notes-body.md

      - name: 📊 Summary
        run: |
          if [ "${NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE}" = "ota" ]; then
            echo "## Release Notes Generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE}" != "ota" ]; then
            echo "- **Tag:** \`${STEPS_CREATE_RELEASE_OUTPUTS_TAG}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Version:** \`${NEEDS_PREPARE_OUTPUTS_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** ${{ needs['detect-changes'].outputs['deploy-type'] == 'ota' && '📦 OTA Update' || '🔨 Native Build' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE}" = "ota" ]; then
            echo "✅ Release notes generated; GitHub release, git tag, and CHANGELOG.md update skipped for OTA." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ GitHub release and CHANGELOG.md updated!" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          NEEDS_DETECT_CHANGES_OUTPUTS_DEPLOY_TYPE: ${{ needs['detect-changes'].outputs['deploy-type'] }}
          STEPS_CREATE_RELEASE_OUTPUTS_TAG: ${{ steps.create_release.outputs.tag }}
          NEEDS_PREPARE_OUTPUTS_VERSION: ${{ needs.prepare.outputs.version }}

  slack-notify:
    name: 📢 Slack Notification
    needs: [release]
    if: always() && needs.release.result == 'success' && !inputs.dry_run
    runs-on: ${{ inputs.runner == 'foam' && 'foam' || 'ubuntu-latest' }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Load fingerprint cache secrets
        uses: ./.github/actions/load-fingerprint-cache-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          variant: ${{ inputs.variant || 'production' }}

      - name: 🥟 Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: Restore previous OTA update IDs
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts restore-ota-update-ids
          --cache-dir .ota-cache
          --bucket "${FOAM_AWS_FINGERPRINT_BUCKET_NAME}"
          --variant "${{ inputs.variant || 'production' }}"

      - name: Get previous OTA IDs for Slack
        id: previous_ota
        run: |
          PREV_IOS=""
          PREV_ANDROID=""
          [ -f .ota-cache/ios ] && PREV_IOS=$(cat .ota-cache/ios)
          [ -f .ota-cache/android ] && PREV_ANDROID=$(cat .ota-cache/android)
          echo "ios<<EOF" >> $GITHUB_OUTPUT
          echo "$PREV_IOS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "android<<EOF" >> $GITHUB_OUTPUT
          echo "$PREV_ANDROID" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download release notes
        if: needs.release.outputs.has_release_notes_file == 'true'
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-notes

      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: false
          version: 2.34.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_WEBHOOK_URL: op://ci-cd/foam-mobile-${{ (inputs.variant || 'production') == 'production' && 'production' || 'staging' }}/SLACK_WEBHOOK_URL

      - name: Send Slack notification
        uses: ./.github/actions/slack-deploy-notification
        with:
          webhook_url: ${{ steps.secrets.outputs.SLACK_WEBHOOK_URL }}
          version: ${{ needs.release.outputs.version }}
          deployment_type: ${{ needs.release.outputs.deployment_type }}
          tag: ${{ needs.release.outputs.tag }}
          ios_update_id: ${{ needs.release.outputs.ios_update_id }}
          android_update_id: ${{ needs.release.outputs.android_update_id }}
          update_group_id: ${{ needs.release.outputs.update_group_id }}
          previous_ios_update_id: ${{ steps.previous_ota.outputs.ios }}
          previous_android_update_id: ${{ steps.previous_ota.outputs.android }}
          release_notes: ${{ needs.release.outputs.release_notes }}
          release_notes_file: ${{ needs.release.outputs.has_release_notes_file == 'true' && '.release-notes-body.md' || '' }}
          release_url: ${{ needs.release.outputs.release_url }}
          repository: ${{ github.repository }}

      - name: Cache OTA update IDs for next run
        if: needs.release.outputs.deployment_type == 'ota'
        run: |
          mkdir -p .ota-cache
          echo "${NEEDS_RELEASE_OUTPUTS_IOS_UPDATE_ID}" > .ota-cache/ios
          echo "${NEEDS_RELEASE_OUTPUTS_ANDROID_UPDATE_ID}" > .ota-cache/android
        env:
          NEEDS_RELEASE_OUTPUTS_IOS_UPDATE_ID: ${{ needs.release.outputs.ios_update_id }}
          NEEDS_RELEASE_OUTPUTS_ANDROID_UPDATE_ID: ${{ needs.release.outputs.android_update_id }}

      - name: Save OTA cache
        if: needs.release.outputs.deployment_type == 'ota'
        run: >
          bunx tsx scripts/workflows/deploy-ota-or-native.ts save-ota-update-ids
          --cache-dir .ota-cache
          --bucket "${FOAM_AWS_FINGERPRINT_BUCKET_NAME}"
          --variant "${{ inputs.variant || 'production' }}"
