name: "Create GitHub Release"
description: "Create git tag and GitHub release."

inputs:
  github_token:
    description: "The Github token to use"
    required: true
  dry:
    description: "Whether to run the action in a dry mode (not creating release, just printing logs)"
    required: false
    default: "false"
  variant:
    description: "The variant to use (production, internal, testflight, or preview)"
    required: true
    default: "production"
  version:
    description: "The app version"
    required: true
  tag:
    description: "The git tag"
    required: true
  previous_tag:
    description: "The previous git tag"
    required: false
    default: ""
  deployment_type:
    description: "The deployment type (native or ota)"
    required: false
    default: "native"
  create_tag:
    description: "Whether to create a git tag"
    required: false
    default: "true"
  create_release:
    description: "Whether to create a GitHub release"
    required: false
    default: "true"
  ios_fingerprint:
    description: "iOS fingerprint (for OTA releases)"
    required: false
    default: ""
  android_fingerprint:
    description: "Android fingerprint (for OTA releases)"
    required: false
    default: ""
  ios_update_id:
    description: "iOS OTA update ID (for OTA releases)"
    required: false
    default: ""
  android_update_id:
    description: "Android OTA update ID (for OTA releases)"
    required: false
    default: ""
  update_group_id:
    description: "OTA update group ID (for OTA releases)"
    required: false
    default: ""
  runtime_version:
    description: "Target runtime version for OTA updates (x.x.x format)"
    required: false
    default: ""

outputs:
  tag:
    description: "The created git tag"
    value: ${{ inputs.tag }}
  previous_tag:
    description: "The previous git tag"
    value: ${{ steps.get_previous_tag.outputs.previous_tag }}
  release_notes:
    description: "The generated release notes"
    value: ${{ steps.generate_release_notes.outputs.release_notes }}
  changelog_updated:
    description: "Whether the CHANGELOG.md was updated"
    value: ${{ steps.update_changelog.outputs.changed }}

runs:
  using: "composite"
  steps:
    - name: Fixup git config
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config --global --add safe.directory /github/workspace
        # Configure git to use token for authentication
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Check inputs
      shell: bash
      run: |
        echo "dry=${INPUTS_DRY}"
        echo "variant=${INPUTS_VARIANT}"
        echo "version=${INPUTS_VERSION}"
        echo "tag=${INPUTS_TAG}"
        echo "deployment_type=${INPUTS_DEPLOYMENT_TYPE}"
        if [ "${INPUTS_DEPLOYMENT_TYPE}" = "ota" ]; then
          echo "update_group_id=${INPUTS_UPDATE_GROUP_ID}"
          echo "ios_update_id=${INPUTS_IOS_UPDATE_ID}"
          echo "android_update_id=${INPUTS_ANDROID_UPDATE_ID}"
          if [ -n "${INPUTS_RUNTIME_VERSION}" ]; then
            echo "runtime_version=${INPUTS_RUNTIME_VERSION}"
          fi
        fi
      env:
        INPUTS_DRY: ${{ inputs.dry }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        INPUTS_VERSION: ${{ inputs.version }}
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        INPUTS_UPDATE_GROUP_ID: ${{ inputs.update_group_id }}
        INPUTS_IOS_UPDATE_ID: ${{ inputs.ios_update_id }}
        INPUTS_ANDROID_UPDATE_ID: ${{ inputs.android_update_id }}
        INPUTS_RUNTIME_VERSION: ${{ inputs.runtime_version }}

    - name: Check tag exists for early exit
      id: check_tag
      shell: bash
      run: |
        TAG="${INPUTS_TAG}"
        # Ensure we have all tags locally
        git fetch --tags origin 2>/dev/null || true

        # Check the tags
        TAG_EXISTS=$(git tag -l "${TAG}" | wc -l)
        if [ "$TAG_EXISTS" -gt 0 ]; then
          echo "Tag $TAG already exists, skipping release creation..."
          echo "tag_exists=true" >> $GITHUB_OUTPUT
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
        fi
      env:
        INPUTS_TAG: ${{ inputs.tag }}

    - name: Get previous tag for given variant
      id: get_previous_tag
      if: steps.check_tag.outputs.tag_exists == 'false'
      shell: bash
      run: |
        set +e  # Disable exit on error for this script - we handle errors manually
        FOUND_PREVIOUS_TAG=""

        # Use provided previous_tag if available
        if [ -n "${INPUTS_PREVIOUS_TAG}" ]; then
          FOUND_PREVIOUS_TAG="${INPUTS_PREVIOUS_TAG}"
        else
          CURRENT_TAG="${INPUTS_TAG}"

          if [ "${INPUTS_DEPLOYMENT_TYPE}" = "ota" ]; then
            # For OTA releases, find the most recent tag (either OTA or native)
            # OTA tags: ota-{version}-{runNumber}; legacy tags may be ota-{updateGroupId}
            # Native tags: {version} or {version}-preview

            if [ "${INPUTS_VARIANT}" = "preview" ]; then
              # Find latest OTA tag for preview
              OTA_TAGS=$(git tag -l "ota-*" 2>/dev/null | grep -v "^${CURRENT_TAG}$" || true)
              if [ -n "$OTA_TAGS" ]; then
                OTA_TAG=$(echo "$OTA_TAGS" | while read tag; do
                  echo "$(git log -1 --format=%ct "$tag" 2>/dev/null || echo 0) $tag"
                done | sort -rn | head -1 | awk '{print $2}')
              else
                OTA_TAG=""
              fi

              # Find latest native tag for preview
              NATIVE_TAG=$(git tag -l 2>/dev/null | grep -E "preview$" | grep -vE "^ota-" | sort -V --reverse | head -1 || true)
            else
              # Find latest OTA tag for production
              OTA_TAGS=$(git tag -l "ota-*" 2>/dev/null | grep -v "^${CURRENT_TAG}$" || true)
              if [ -n "$OTA_TAGS" ]; then
                OTA_TAG=$(echo "$OTA_TAGS" | while read tag; do
                  echo "$(git log -1 --format=%ct "$tag" 2>/dev/null || echo 0) $tag"
                done | sort -rn | head -1 | awk '{print $2}')
              else
                OTA_TAG=""
              fi

              # Find latest native tag for production (exclude preview tags)
              NATIVE_TAG=$(git tag -l 2>/dev/null | grep -v "preview" | grep -vE "^ota-" | sort -V --reverse | head -1 || true)
            fi

            # Compare commit dates: use whichever is newer
            if [ -n "$NATIVE_TAG" ] && [ -n "$OTA_TAG" ]; then
              NATIVE_DATE=$(git log -1 --format=%ct "$NATIVE_TAG" 2>/dev/null || echo 0)
              OTA_DATE=$(git log -1 --format=%ct "$OTA_TAG" 2>/dev/null || echo 0)

              if [ "$NATIVE_DATE" -gt "$OTA_DATE" ]; then
                FOUND_PREVIOUS_TAG="$NATIVE_TAG"
                echo "Using native build tag (newer): ${NATIVE_TAG}"
              else
                FOUND_PREVIOUS_TAG="$OTA_TAG"
                echo "Using previous OTA tag (newer): ${OTA_TAG}"
              fi
            elif [ -n "$NATIVE_TAG" ]; then
              FOUND_PREVIOUS_TAG="$NATIVE_TAG"
              echo "Using native build tag: ${NATIVE_TAG}"
            elif [ -n "$OTA_TAG" ]; then
              FOUND_PREVIOUS_TAG="$OTA_TAG"
              echo "Using previous OTA tag: ${OTA_TAG}"
            else
              echo "No previous tag found"
            fi
          else
            # For native builds, use the original logic
            if [ "${INPUTS_VARIANT}" = "preview" ]; then
              FOUND_PREVIOUS_TAG=$(git tag -l 2>/dev/null | grep -E "preview$" | grep -vE "^ota-" | sort -V --reverse | head -1 || true)
            else
              FOUND_PREVIOUS_TAG=$(git tag -l 2>/dev/null | grep -v "preview" | grep -vE "^ota-" | sort -V --reverse | head -1 || true)
            fi
          fi
        fi

        if [ -z "$FOUND_PREVIOUS_TAG" ]; then
          echo "No tag found..."
        else
          echo "Tag found: ${FOUND_PREVIOUS_TAG}"
        fi

        echo "previous_tag=$FOUND_PREVIOUS_TAG" >> $GITHUB_OUTPUT
      env:
        INPUTS_PREVIOUS_TAG: ${{ inputs.previous_tag }}
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        INPUTS_VARIANT: ${{ inputs.variant }}

    - name: Install git-cliff
      if: steps.check_tag.outputs.tag_exists == 'false'
      shell: bash
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        ~/.cargo/bin/cargo-binstall git-cliff --no-confirm --force

    - name: Generate release notes with git-cliff
      id: generate_release_notes
      if: steps.check_tag.outputs.tag_exists == 'false'
      shell: bash
      run: |
        PREVIOUS="${STEPS_GET_PREVIOUS_TAG_OUTPUTS_PREVIOUS_TAG}"
        TAG="${INPUTS_TAG}"

        if [ -z "$PREVIOUS" ]; then
          RELEASE_NOTES="Initial release"
        else
          # Generate release notes for only unreleased commits since the previous tag
          # --tag sets the version name, --unreleased only includes commits not in any tag
          # --strip all removes headers/footers, leaving just the grouped commits
          RAW_NOTES=$(~/.cargo/bin/git-cliff --config cliff.toml "$PREVIOUS"..HEAD --tag "$TAG" --unreleased --strip all 2>&1 | grep -v "^[[:space:]]*WARN\|^[[:space:]]*ERROR" || echo "")

          # Check if we got meaningful content (more than just the header)
          # Strip the header line and check if there's content
          CONTENT_ONLY=$(echo "$RAW_NOTES" | tail -n +2 | sed '/^[[:space:]]*$/d')
          
          if [ -z "$CONTENT_ONLY" ]; then
            # No unreleased changes found
            COMMIT_COUNT=$(git rev-list --count "$PREVIOUS"..HEAD 2>/dev/null || echo "0")
            if [ "$COMMIT_COUNT" = "0" ]; then
              RELEASE_NOTES="No changes since previous release."
            else
              # There are commits but they're all already tagged - use git log as fallback
              echo "No unreleased commits found, using git log for recent commits"
              GIT_LOG=$(git log --pretty=format:"- %s" "$PREVIOUS"..HEAD | head -20)
              RELEASE_NOTES="### Changes"$'\n\n'"${GIT_LOG}"
            fi
          else
            RELEASE_NOTES="$RAW_NOTES"
          fi

          # Check for git-cliff errors
          if echo "$RELEASE_NOTES" | grep -q "panicked"; then
            echo "git-cliff panicked, falling back to git log"
            GIT_LOG=$(git log --pretty=format:"- %s" "$PREVIOUS"..HEAD | head -20)
            RELEASE_NOTES="### Changes"$'\n\n'"${GIT_LOG}"
          fi

          # git-cliff with a range outputs one section per tag in that range; keep only this release's section (first ## block)
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | awk 'BEGIN{first=1} /^## / { if (!first) exit; first=0 } { print }')
        fi

        # Use heredoc syntax for multiline/special character output
        {
          echo "release_notes<<EOF"
          echo "$RELEASE_NOTES"
          echo "EOF"
        } >> $GITHUB_OUTPUT

        echo "$RELEASE_NOTES" > .release-notes-body.md
      env:
        STEPS_GET_PREVIOUS_TAG_OUTPUTS_PREVIOUS_TAG: ${{ steps.get_previous_tag.outputs.previous_tag }}
        INPUTS_TAG: ${{ inputs.tag }}

    - name: Update CHANGELOG.md
      id: update_changelog
      if: ${{ inputs.dry == 'false' && steps.check_tag.outputs.tag_exists == 'false' }}
      shell: bash
      run: |
        # Generate the full changelog
        # Pass --tag to tell git-cliff that HEAD should be treated as this tag
        # This prevents commits from appearing as "unreleased" when they're being released
        ~/.cargo/bin/git-cliff --config cliff.toml --tag "${INPUTS_TAG}" -o CHANGELOG.md

        # Check if changelog has changed
        if git diff --quiet CHANGELOG.md 2>/dev/null; then
          echo "CHANGELOG.md has not changed"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "CHANGELOG.md has changed, committing directly to main..."
          echo "changed=true" >> $GITHUB_OUTPUT

          # Configure git for commit (use the actor who triggered the workflow)
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

          # Commit and push directly to main
          git add CHANGELOG.md
          git commit -m "chore(changelog): update CHANGELOG.md for ${INPUTS_TAG}"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${INPUTS_GITHUB_TOKEN}" push "https://github.com/${GITHUB_REPOSITORY}.git" HEAD:main

          echo "CHANGELOG.md committed and pushed to main"
        fi
      env:
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Get variant-specific app info
      id: get_app_info
      if: steps.check_tag.outputs.tag_exists == 'false'
      shell: bash
      run: |
        if [ "${INPUTS_VARIANT}" = "preview" ]; then
          VARIANT_TYPE="Preview"
        elif [ "${INPUTS_VARIANT}" = "internal" ]; then
          VARIANT_TYPE="Internal"
        elif [ "${INPUTS_VARIANT}" = "testflight" ]; then
          VARIANT_TYPE="TestFlight"
        else
          VARIANT_TYPE="Production"
        fi

        DEPLOYMENT_TYPE="${INPUTS_DEPLOYMENT_TYPE}"
        if [ "$DEPLOYMENT_TYPE" = "ota" ]; then
          DEPLOYMENT_LABEL="OTA Update"
        else
          DEPLOYMENT_LABEL="Native Build"
        fi

        echo "variant_type=$VARIANT_TYPE" >> $GITHUB_OUTPUT
        echo "deployment_label=$DEPLOYMENT_LABEL" >> $GITHUB_OUTPUT
      env:
        INPUTS_VARIANT: ${{ inputs.variant }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}

    - name: Create a new tag
      id: tag
      if: ${{ inputs.dry == 'false' && steps.check_tag.outputs.tag_exists == 'false' && inputs.create_tag != 'false' }}
      uses: anothrNick/github-tag-action@a2c70ae13a881faf2b4953baaa9e49731997ab36
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        CUSTOM_TAG: ${{ inputs.tag }}
        TAG_MESSAGE: |
          ${{ steps.get_app_info.outputs.variant_type }} ${{ steps.get_app_info.outputs.deployment_label }}: ${{ inputs.tag }}

          ${{ github.event.head_commit.message }}

    - name: Build release body
      id: build_release_body
      if: ${{ inputs.dry == 'false' && steps.check_tag.outputs.tag_exists == 'false' && inputs.create_release != 'false' }}
      shell: bash
      run: |
        # GitHub release body = metadata + only this release's notes (.release-notes-body.md).
        # Do not include CHANGELOG.md (full cumulative changelog lives in repo only).
        BODY="## ${STEPS_GET_APP_INFO_OUTPUTS_VARIANT_TYPE} ${STEPS_GET_APP_INFO_OUTPUTS_DEPLOYMENT_LABEL}: ${INPUTS_TAG}

        **Deployment Type:** ${STEPS_GET_APP_INFO_OUTPUTS_DEPLOYMENT_LABEL}
        **App Version:** \`${INPUTS_VERSION}\`
        **Previous tag:** ${PREVIOUS_TAG}"

        # Add OTA-specific info
        if [ "${INPUTS_DEPLOYMENT_TYPE}" = "ota" ]; then
          # Add Update Group ID (primary identifier for OTA updates)
          if [ -n "${INPUTS_UPDATE_GROUP_ID}" ]; then
            BODY="${BODY}

        ### OTA Update Info
        **Update Group ID:** \`${INPUTS_UPDATE_GROUP_ID}\`"
          fi

          # Add target runtime version if specified
          if [ -n "${INPUTS_RUNTIME_VERSION}" ]; then
            BODY="${BODY}
        **Target Runtime Version:** \`${INPUTS_RUNTIME_VERSION}\`"
          fi

          # Add platform-specific update IDs
          if [ -n "${INPUTS_IOS_UPDATE_ID}" ]; then
            BODY="${BODY}
        **iOS Update ID:** \`${INPUTS_IOS_UPDATE_ID}\`"
          fi
          if [ -n "${INPUTS_ANDROID_UPDATE_ID}" ]; then
            BODY="${BODY}
        **Android Update ID:** \`${INPUTS_ANDROID_UPDATE_ID}\`"
          fi

          # Add fingerprints
          if [ -n "${INPUTS_IOS_FINGERPRINT}" ] || [ -n "${INPUTS_ANDROID_FINGERPRINT}" ]; then
            BODY="${BODY}

        ### Fingerprints"
            if [ -n "${INPUTS_IOS_FINGERPRINT}" ]; then
              BODY="${BODY}
        **iOS:** \`${INPUTS_IOS_FINGERPRINT}\`"
            fi
            if [ -n "${INPUTS_ANDROID_FINGERPRINT}" ]; then
              BODY="${BODY}
        **Android:** \`${INPUTS_ANDROID_FINGERPRINT}\`"
            fi
          fi
        fi

        # Append only this release's changelog. git-cliff with a range outputs one section per tag
        # in that range, so take only the first "## " block (this tag's section).
        if [ -f .release-notes-body.md ]; then
          RELEASE_SECTION=$(awk 'BEGIN{first=1} /^## / { if (!first) exit; first=0 } { print }' .release-notes-body.md)
          BODY="${BODY}

        ---

        ${RELEASE_SECTION}"
        fi

        # Use heredoc for multiline output
        {
          echo "body<<EOF"
          echo "$BODY"
          echo "EOF"
        } >> $GITHUB_OUTPUT
      env:
        STEPS_GET_APP_INFO_OUTPUTS_VARIANT_TYPE: ${{ steps.get_app_info.outputs.variant_type }}
        STEPS_GET_APP_INFO_OUTPUTS_DEPLOYMENT_LABEL: ${{ steps.get_app_info.outputs.deployment_label }}
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_VERSION: ${{ inputs.version }}
        PREVIOUS_TAG: ${{ steps.get_previous_tag.outputs.previous_tag || 'N/A (initial release)' }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        INPUTS_UPDATE_GROUP_ID: ${{ inputs.update_group_id }}
        INPUTS_RUNTIME_VERSION: ${{ inputs.runtime_version }}
        INPUTS_IOS_UPDATE_ID: ${{ inputs.ios_update_id }}
        INPUTS_ANDROID_UPDATE_ID: ${{ inputs.android_update_id }}
        INPUTS_IOS_FINGERPRINT: ${{ inputs.ios_fingerprint }}
        INPUTS_ANDROID_FINGERPRINT: ${{ inputs.android_fingerprint }}

    - name: Create a new release
      if: ${{ inputs.dry == 'false' && steps.check_tag.outputs.tag_exists == 'false' && inputs.create_release != 'false' }}
      shell: bash
      run: |
        printf '%s' "$RELEASE_BODY" > .release-body.md

        latest_args=(--latest=false)
        if [ "$INPUTS_VARIANT" = "production" ]; then
          latest_args=(--latest)
        fi

        gh release create "$INPUTS_TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --verify-tag \
          --title "$INPUTS_TAG" \
          --notes-file .release-body.md \
          "${latest_args[@]}"
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        RELEASE_BODY: ${{ steps.build_release_body.outputs.body }}

    - name: Dry run output
      if: ${{ inputs.dry == 'true' && steps.check_tag.outputs.tag_exists == 'false' }}
      shell: bash
      run: |
        echo "========= DRY MODE =========="
        echo "Would create GitHub release:"
        echo "Tag: ${INPUTS_TAG}"
        echo "App Version: ${INPUTS_VERSION}"
        echo "Variant: ${INPUTS_VARIANT}"
        echo "Deployment Type: ${STEPS_GET_APP_INFO_OUTPUTS_DEPLOYMENT_LABEL}"
        echo "Previous tag: ${STEPS_GET_PREVIOUS_TAG_OUTPUTS_PREVIOUS_TAG}"
        if [ "${INPUTS_DEPLOYMENT_TYPE}" = "ota" ]; then
          echo ""
          echo "=== OTA Update Info ==="
          echo "Update Group ID: ${INPUTS_UPDATE_GROUP_ID}"
          echo "iOS Update ID: ${INPUTS_IOS_UPDATE_ID}"
          echo "Android Update ID: ${INPUTS_ANDROID_UPDATE_ID}"
          echo "iOS Fingerprint: ${INPUTS_IOS_FINGERPRINT}"
          echo "Android Fingerprint: ${INPUTS_ANDROID_FINGERPRINT}"
          if [ -n "${INPUTS_RUNTIME_VERSION}" ]; then
            echo "Target Runtime Version: ${INPUTS_RUNTIME_VERSION}"
          fi
        fi
        echo ""
        echo "=== CHANGELOG.md ==="
        echo "Would generate and commit CHANGELOG.md if changed"
        echo ""
        echo "=== Generated Changelog ==="
        echo "${STEPS_GENERATE_RELEASE_NOTES_OUTPUTS_RELEASE_NOTES}"
        echo "============================="
      env:
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_VERSION: ${{ inputs.version }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        STEPS_GET_APP_INFO_OUTPUTS_DEPLOYMENT_LABEL: ${{ steps.get_app_info.outputs.deployment_label }}
        STEPS_GET_PREVIOUS_TAG_OUTPUTS_PREVIOUS_TAG: ${{ steps.get_previous_tag.outputs.previous_tag }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        INPUTS_UPDATE_GROUP_ID: ${{ inputs.update_group_id }}
        INPUTS_IOS_UPDATE_ID: ${{ inputs.ios_update_id }}
        INPUTS_ANDROID_UPDATE_ID: ${{ inputs.android_update_id }}
        INPUTS_IOS_FINGERPRINT: ${{ inputs.ios_fingerprint }}
        INPUTS_ANDROID_FINGERPRINT: ${{ inputs.android_fingerprint }}
        INPUTS_RUNTIME_VERSION: ${{ inputs.runtime_version }}
        STEPS_GENERATE_RELEASE_NOTES_OUTPUTS_RELEASE_NOTES: ${{ steps.generate_release_notes.outputs.release_notes }}
