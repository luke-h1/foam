name: 'Create GitHub Release'
description: 'Generate release notes, update CHANGELOG.md, and create native GitHub releases.'

inputs:
  github_token:
    description: 'The Github token to use'
    required: true
  dry:
    description: 'Whether to run the action in dry mode'
    required: false
    default: 'false'
  variant:
    description: 'The variant to use (production, internal, testflight, or preview)'
    required: true
    default: 'production'
  version:
    description: 'The app version'
    required: true
  tag:
    description: 'The git tag'
    required: true
  previous_tag:
    description: 'The previous git tag'
    required: false
    default: ''
  deployment_type:
    description: 'The deployment type (native or ota)'
    required: false
    default: 'native'
  commit_changelog:
    description: 'Whether to commit CHANGELOG.md for native releases'
    required: false
    default: 'true'

outputs:
  tag:
    description: 'The resolved git tag'
    value: ${{ steps.release_tag.outputs.tag }}
  previous_tag:
    description: 'The previous git tag'
    value: ${{ steps.previous_tag.outputs.previous_tag }}
  release_notes:
    description: 'The generated release notes'
    value: ${{ steps.release_notes.outputs.release_notes }}
  changelog_updated:
    description: 'Whether the CHANGELOG.md was updated'
    value: ${{ steps.update_changelog.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Configure git auth
      shell: bash
      run: |
        git config --global --add safe.directory /github/workspace

    - name: Check inputs
      shell: bash
      env:
        INPUTS_DRY: ${{ inputs.dry }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        INPUTS_VERSION: ${{ inputs.version }}
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
      run: |
        echo "dry=${INPUTS_DRY}"
        echo "variant=${INPUTS_VARIANT}"
        echo "version=${INPUTS_VERSION}"
        echo "tag=${INPUTS_TAG}"
        echo "deployment_type=${INPUTS_DEPLOYMENT_TYPE}"

    - name: Resolve release tag
      id: release_tag
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUTS_TAG: ${{ inputs.tag }}
      run: |
        TAG="${INPUTS_TAG}"
        AUTH_HEADER="$(printf 'luke-h1:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" fetch --tags origin 2>/dev/null || true

        TAG_EXISTS=false
        if git tag -l "$TAG" | grep -qx "$TAG"; then
          TAG_EXISTS=true
          echo "Tag $TAG already exists; will reuse it"
        else
          echo "Tag $TAG does not exist; will create it for native releases"
        fi

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "tag_already_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

    - name: Get previous tag for variant
      id: previous_tag
      shell: bash
      env:
        INPUTS_PREVIOUS_TAG: ${{ inputs.previous_tag }}
        INPUTS_TAG: ${{ steps.release_tag.outputs.tag }}
        INPUTS_VARIANT: ${{ inputs.variant }}
      run: |
        if [ -n "$INPUTS_PREVIOUS_TAG" ]; then
          FOUND_PREVIOUS_TAG="$INPUTS_PREVIOUS_TAG"
        else
          NATIVE_TAG_PATTERN='^v?[0-9]+\.[0-9]+\.[0-9]+$'
          if [ "$INPUTS_VARIANT" != "production" ]; then
            NATIVE_TAG_PATTERN="^v?[0-9]+\\.[0-9]+\\.[0-9]+-${INPUTS_VARIANT}$"
          fi

          FOUND_PREVIOUS_TAG=$(
            git tag -l 2>/dev/null |
              grep -E "$NATIVE_TAG_PATTERN" |
              grep -vE '^ota-' |
              grep -v "^${INPUTS_TAG}$" |
              sort -V --reverse |
              head -1 || true
          )
        fi

        if [ -z "$FOUND_PREVIOUS_TAG" ]; then
          echo "No previous tag found"
        else
          echo "Previous tag: $FOUND_PREVIOUS_TAG"
        fi

        echo "previous_tag=$FOUND_PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

    - name: Install git-cliff
      shell: bash
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        ~/.cargo/bin/cargo-binstall git-cliff --no-confirm --force

    - name: Generate release notes
      id: release_notes
      shell: bash
      env:
        PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        INPUTS_TAG: ${{ steps.release_tag.outputs.tag }}
      run: |
        if [ -z "$PREVIOUS_TAG" ]; then
          RELEASE_NOTES="Initial release"
        else
          RAW_NOTES=$(~/.cargo/bin/git-cliff --config cliff.toml "$PREVIOUS_TAG"..HEAD --tag "$INPUTS_TAG" --unreleased --strip all 2>&1 | grep -v "^[[:space:]]*WARN\|^[[:space:]]*ERROR" || echo "")
          CONTENT_ONLY=$(echo "$RAW_NOTES" | tail -n +2 | sed '/^[[:space:]]*$/d')

          if [ -n "$CONTENT_ONLY" ]; then
            RELEASE_NOTES="$RAW_NOTES"
          else
            COMMIT_COUNT=$(git rev-list --count "$PREVIOUS_TAG"..HEAD 2>/dev/null || echo "0")
            if [ "$COMMIT_COUNT" = "0" ]; then
              RELEASE_NOTES="No changes since previous release."
            else
              echo "No unreleased commits found, using git log for recent commits"
              GIT_LOG=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD | head -20)
              RELEASE_NOTES="### Changes"$'\n\n'"${GIT_LOG}"
            fi
          fi

          if echo "$RELEASE_NOTES" | grep -q "panicked"; then
            echo "git-cliff panicked, falling back to git log"
            GIT_LOG=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD | head -20)
            RELEASE_NOTES="### Changes"$'\n\n'"${GIT_LOG}"
          fi

          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | awk 'BEGIN{first=1} /^## / { if (!first) exit; first=0 } { print }')
        fi

        {
          echo "release_notes<<EOF"
          echo "$RELEASE_NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        echo "$RELEASE_NOTES" > .release-notes-body.md

    - name: Update CHANGELOG.md
      id: update_changelog
      if: ${{ inputs.dry == 'false' && inputs.deployment_type == 'native' && inputs.commit_changelog != 'false' }}
      uses: ./.github/actions/update-changelog
      with:
        github_token: ${{ inputs.github_token }}
        tag: ${{ steps.release_tag.outputs.tag }}

    - name: Resolve release labels
      id: labels
      shell: bash
      env:
        INPUTS_VARIANT: ${{ inputs.variant }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
      run: |
        case "$INPUTS_VARIANT" in
          preview) VARIANT_LABEL="Preview" ;;
          internal) VARIANT_LABEL="Internal" ;;
          testflight) VARIANT_LABEL="TestFlight" ;;
          *) VARIANT_LABEL="Production" ;;
        esac

        DEPLOYMENT_LABEL="Native Build"
        if [ "$INPUTS_DEPLOYMENT_TYPE" = "ota" ]; then
          DEPLOYMENT_LABEL="OTA Update"
        fi

        echo "variant=$VARIANT_LABEL" >> "$GITHUB_OUTPUT"
        echo "deployment=$DEPLOYMENT_LABEL" >> "$GITHUB_OUTPUT"

    - name: Create native tag
      if: ${{ inputs.dry == 'false' && inputs.deployment_type == 'native' && steps.release_tag.outputs.tag_already_exists != 'true' }}
      uses: anothrNick/github-tag-action@a2c70ae13a881faf2b4953baaa9e49731997ab36
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        CUSTOM_TAG: ${{ steps.release_tag.outputs.tag }}
        TAG_MESSAGE: |
          ${{ steps.labels.outputs.variant }} ${{ steps.labels.outputs.deployment }}: ${{ steps.release_tag.outputs.tag }}

          ${{ github.event.head_commit.message }}

    - name: Build release body
      id: release_body
      if: ${{ inputs.dry == 'false' && inputs.deployment_type == 'native' }}
      shell: bash
      env:
        VARIANT_LABEL: ${{ steps.labels.outputs.variant }}
        DEPLOYMENT_LABEL: ${{ steps.labels.outputs.deployment }}
        INPUTS_TAG: ${{ steps.release_tag.outputs.tag }}
        INPUTS_VERSION: ${{ inputs.version }}
        PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag || 'N/A (initial release)' }}
      run: |
        BODY="## ${VARIANT_LABEL} ${DEPLOYMENT_LABEL}: ${INPUTS_TAG}

        **Deployment Type:** ${DEPLOYMENT_LABEL}
        **App Version:** \`${INPUTS_VERSION}\`
        **Previous tag:** ${PREVIOUS_TAG}"

        if [ -f .release-notes-body.md ]; then
          RELEASE_SECTION=$(awk 'BEGIN{first=1} /^## / { if (!first) exit; first=0 } { print }' .release-notes-body.md)
          BODY="${BODY}

        ---

        ${RELEASE_SECTION}"
        fi

        {
          echo "body<<EOF"
          echo "$BODY"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create or update native release
      if: ${{ inputs.dry == 'false' && inputs.deployment_type == 'native' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        INPUTS_TAG: ${{ steps.release_tag.outputs.tag }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        RELEASE_BODY: ${{ steps.release_body.outputs.body }}
      run: |
        printf '%s' "$RELEASE_BODY" > .release-body.md

        latest_args=(--latest=false)
        if [ "$INPUTS_VARIANT" = "production" ]; then
          latest_args=(--latest)
        fi

        if gh release view "$INPUTS_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          gh release edit "$INPUTS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$INPUTS_TAG" \
            --notes-file .release-body.md \
            "${latest_args[@]}"
        else
          gh release create "$INPUTS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$INPUTS_TAG" \
            --notes-file .release-body.md \
            "${latest_args[@]}"
        fi

    - name: Dry run output
      if: ${{ inputs.dry == 'true' }}
      shell: bash
      env:
        INPUTS_TAG: ${{ steps.release_tag.outputs.tag }}
        INPUTS_VERSION: ${{ inputs.version }}
        INPUTS_VARIANT: ${{ inputs.variant }}
        INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        DEPLOYMENT_LABEL: ${{ steps.labels.outputs.deployment }}
        PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        RELEASE_NOTES: ${{ steps.release_notes.outputs.release_notes }}
      run: |
        echo "========= DRY MODE =========="
        echo "Tag: ${INPUTS_TAG}"
        echo "App Version: ${INPUTS_VERSION}"
        echo "Variant: ${INPUTS_VARIANT}"
        echo "Deployment Type: ${DEPLOYMENT_LABEL}"
        echo "Previous tag: ${PREVIOUS_TAG}"

        if [ "$INPUTS_DEPLOYMENT_TYPE" = "native" ]; then
          echo "Would create/update native GitHub release and commit CHANGELOG.md if changed"
        else
          echo "Would generate OTA release notes; no GitHub release, git tag, or CHANGELOG.md commit"
        fi

        echo ""
        echo "=== Generated Changelog ==="
        echo "$RELEASE_NOTES"
        echo "============================="
