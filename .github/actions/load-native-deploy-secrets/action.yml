name: "Load Native Deploy Secrets"
description: "Load secrets required by local native EAS build and submit."

inputs:
  op_service_account_token:
    description: "1Password service account token"
    required: true
  variant:
    description: "Release variant; production reads all secrets from the ci-cd/foam-mobile-production item, every other variant from ci-cd/foam-mobile-staging."
    required: false
    default: "production"

runs:
  using: "composite"
  steps:
    - name: Load secrets
      id: load_secrets
      uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
      with:
        export-env: true
        version: 2.34.0
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op_service_account_token }}
        TWITCH_CLIENT_ID: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/TWITCH_CLIENT_ID
        TWITCH_CLIENT_SECRET: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/TWITCH_CLIENT_SECRET
        AUTH_PROXY_API_BASE_URL: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/AUTH_PROXY_API_BASE_URL
        AUTH_PROXY_API_KEY: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/AUTH_PROXY_API_KEY
        EXPO_PUBLIC_AUTH_PROXY_API_BASE_URL: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/AUTH_PROXY_API_BASE_URL
        EXPO_PUBLIC_AUTH_PROXY_API_KEY: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/AUTH_PROXY_API_KEY
        EXPO_PUBLIC_TWITCH_CLIENT_ID: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/TWITCH_CLIENT_ID
        EXPO_PUBLIC_STATSIG_CLIENT_KEY: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/EXPO_PUBLIC_STATSIG_CLIENT_KEY
        SENTRY_AUTH_TOKEN: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/SENTRY_AUTH_TOKEN
        EXPO_PUBLIC_SENTRY_DSN: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/EXPO_PUBLIC_SENTRY_DSN
        FOAM_AWS_FINGERPRINT_ACCESS_KEY_ID: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/FOAM_AWS_FINGERPRINT_ACCESS_KEY_ID
        FOAM_AWS_FINGERPRINT_SECRET_KEY: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/FOAM_AWS_FINGERPRINT_SECRET_KEY
        FOAM_AWS_FINGERPRINT_BUCKET_NAME: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/FOAM_AWS_FINGERPRINT_BUCKET_NAME
        GOOGLE_SERVICES_IOS_PROD_BS4: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/GOOGLE_SERVICES_IOS_PROD_BS4
        GOOGLE_SERVICES_ANDROID_PROD_BS4: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/GOOGLE_SERVICES_ANDROID_PROD_BS4
        SLACK_WEBHOOK_URL: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/SLACK_WEBHOOK_URL
        EXPO_PUBLIC_VEXO_API_KEY: op://ci-cd/foam-mobile-${{ inputs.variant == 'production' && 'production' || 'staging' }}/EXPO_PUBLIC_VEXO_API_KEY
        OP_ENV_FILE: ".env"
