name: 'Update Changelog'
description: 'Generate CHANGELOG.md with git-cliff, commit it, and push to main when changed.'

inputs:
  github_token:
    description: 'The GitHub token to use for pushing the changelog commit'
    required: true
  tag:
    description: 'The release tag to render into CHANGELOG.md'
    required: true

outputs:
  changed:
    description: 'Whether CHANGELOG.md changed'
    value: ${{ steps.update.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Update CHANGELOG.md
      id: update
      shell: bash
      env:
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        ~/.cargo/bin/git-cliff --config cliff.toml --tag "$INPUTS_TAG" -o CHANGELOG.md

        if git diff --quiet CHANGELOG.md 2>/dev/null; then
          echo "CHANGELOG.md has not changed"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "CHANGELOG.md has changed, committing directly to main..."
        echo "changed=true" >> "$GITHUB_OUTPUT"

        git config user.name "$GITHUB_ACTOR"
        git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "chore(changelog): update CHANGELOG.md for ${INPUTS_TAG}"
        git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${INPUTS_GITHUB_TOKEN}" push "https://github.com/${GITHUB_REPOSITORY}.git" HEAD:main
