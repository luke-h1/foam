name: 'Update Changelog'
description: 'Generate CHANGELOG.md with git-cliff, commit it, and push to main when changed.'

inputs:
  github_token:
    description: 'The GitHub token to use for pushing the changelog commit'
    required: true
  tag:
    description: 'The release tag to render into CHANGELOG.md'
    required: true

outputs:
  changed:
    description: 'Whether CHANGELOG.md changed'
    value: ${{ steps.update.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Update CHANGELOG.md
      id: update
      shell: bash
      env:
        INPUTS_TAG: ${{ inputs.tag }}
        INPUTS_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git pull --rebase
        # Keep all variant tags so the changelog retains per-environment sections.
        IGNORE_TAGS=""

        ~/.cargo/bin/git-cliff --config cliff.toml --tag "$INPUTS_TAG" --ignore-tags "$IGNORE_TAGS" -o CHANGELOG.md

        GIT_CLIFF_BIN="$HOME/.cargo/bin/git-cliff" bunx tsx scripts/workflows/changelog-per-env-cli.ts CHANGELOG.md "$INPUTS_TAG"
        bunx tsx scripts/workflows/changelog-headings-cli.ts CHANGELOG.md
        bunx prettier --write CHANGELOG.md

        if git diff --quiet CHANGELOG.md 2>/dev/null; then
          echo "CHANGELOG.md has not changed"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "CHANGELOG.md has changed, committing directly to main..."
        echo "changed=true" >> "$GITHUB_OUTPUT"

        git config user.name "luke-h1"
        git config user.email "55030296+luke-h1@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "chore(changelog): update CHANGELOG.md for ${INPUTS_TAG}"
        AUTH_HEADER="$(printf 'luke-h1:%s' "$INPUTS_GITHUB_TOKEN" | base64 | tr -d '\n')"
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" push "https://github.com/${GITHUB_REPOSITORY}.git" HEAD:main
