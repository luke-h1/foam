name: 'Setup Bun and Install'
description: 'Install Bun from the repo version file and install dependencies.'

inputs:
  ignore-scripts:
    description: 'Pass --ignore-scripts to bun install to skip postinstall scripts.'
    required: false
    default: 'false'
  node:
    description: 'Also set up Node from .nvmrc (for tooling that shells out to node).'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      id: setup_bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version-file: '.bun-version'

    # setup-bun runs inside a composite action; expose Bun to later workflow steps.
    - name: Add Bun to job PATH
      shell: bash
      run: echo "$(dirname "${{ steps.setup_bun.outputs.bun-path }}")" >> "$GITHUB_PATH"

    - name: Setup Node
      if: ${{ inputs.node == 'true' }}
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      shell: bash
      env:
        IGNORE_SCRIPTS: ${{ inputs.ignore-scripts }}
      run: |
        if [ "$IGNORE_SCRIPTS" = "true" ]; then
          bun install --frozen-lockfile --ignore-scripts
        else
          bun install --frozen-lockfile
        fi
