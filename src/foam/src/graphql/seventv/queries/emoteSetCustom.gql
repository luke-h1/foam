query emoteSetCustom($id: Id!) {
  emoteSets {
    emoteSet(id: $id) {
      id
      name
      capacity
      ownerId
      kind
      updatedAt
      emotes(page: 1, perPage: 1000) {
        totalCount
        items {
          id
          alias
          addedById
          emote {
            id
            defaultName
            tags
            aspectRatio
            flags {
              animated
              defaultZeroWidth
            }
            images {
              ...ImageFragment
            }
            owner {
              id
              mainConnection {
                platformDisplayName
              }
            }
          }
          flags {
            zeroWidth
          }
        }
      }
    }
  }
}
